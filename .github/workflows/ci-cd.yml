name: PicoERP CI/CD

# Triggers: auto-deploy on push to main; build-only on PRs and develop
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/PicoERP.Web/PicoERP.Web.csproj

      - name: Build (Release)
        run: dotnet build src/PicoERP.Web/PicoERP.Web.csproj -c Release --no-restore

  # ── Job 2: Publish & Deploy to Plesk via FTP (main branch only) ─────────
  deploy:
    name: Publish & Deploy to Plesk
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/PicoERP.Web/PicoERP.Web.csproj

      - name: Publish (self-contained, win-x64)
        run: |
          dotnet publish src/PicoERP.Web/PicoERP.Web.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -o ./publish_output \
            /p:UseAppHost=true

      # Upload every file in publish_output/ to the Plesk FTP root.
      # Secrets are set in: GitHub repo → Settings → Secrets → Actions
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:        ${{ secrets.FTP_HOST }}
          username:      ${{ secrets.FTP_USER }}
          password:      ${{ secrets.FTP_PASSWORD }}
          local-dir:     ./publish_output/
          server-dir:    /
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/Data/**
            **/logs/**
            **/Backups/**
            appsettings.Production.json
