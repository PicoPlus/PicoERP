name: PicoERP CI/CD

# Triggers: auto-deploy on push to main; build-only on PRs and develop
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/PicoERP.Web/PicoERP.Web.csproj

      - name: Build (Release)
        run: dotnet build src/PicoERP.Web/PicoERP.Web.csproj -c Release --no-restore

  # ── Job 2: Publish & Deploy to Plesk via FTP (main branch only) ─────────
  deploy:
    name: Publish & Deploy to Plesk
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/PicoERP.Web/PicoERP.Web.csproj

      - name: Publish (framework-dependent, win-x64)
        run: |
          dotnet publish src/PicoERP.Web/PicoERP.Web.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -o ./publish_output \
            /p:UseAppHost=true

      # ── Step: place "under construction" page on the server BEFORE wiping ──
      # This uploads a single maintenance HTML so visitors see it while the old
      # site is being removed and the new build is uploading.
      - name: Upload under-construction page
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:        ${{ secrets.FTP_HOST }}
          username:      ${{ secrets.FTP_USER }}
          password:      ${{ secrets.FTP_PASSWORD }}
          local-dir:     ./maintenance/
          server-dir:    /publish/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**

      # ── Step: deploy the real build (replaces the maintenance page) ─────────
      # dangerous-clean-slate removes everything on the server first, then
      # uploads the full publish_output so no stale files remain.
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:        ${{ secrets.FTP_HOST }}
          username:      ${{ secrets.FTP_USER }}
          password:      ${{ secrets.FTP_PASSWORD }}
          local-dir:     ./publish_output/
          server-dir:    /publish/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/Data/**
            **/logs/**
            **/Backups/**
            appsettings.Production.json
