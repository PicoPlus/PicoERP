<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>در حال به‌روزرسانی — پیکو ERP</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: Tahoma, "Segoe UI", Arial, sans-serif;
    background: #f4f6f9;
    color: #1f2328;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 48px 40px 40px;
    max-width: 480px;
    width: 92%;
    text-align: center;
  }
  .icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #fff7ed;
    border: 2px solid #fed7aa;
    margin-bottom: 24px;
  }
  .icon svg {
    width: 36px;
    height: 36px;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 12px;
    color: #1f2328;
  }
  p {
    font-size: 0.95rem;
    line-height: 1.7;
    color: #57606a;
    margin-bottom: 28px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 0.82rem;
    font-weight: 600;
    color: #15803d;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  footer {
    margin-top: 32px;
    font-size: 0.75rem;
    color: #8b949e;
    border-top: 1px solid #e5e7eb;
    padding-top: 16px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <!-- wrench / settings SVG -->
      <svg viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
        <path d="M12 2v2m0 16v2M2 12h2m16 0h2"/>
      </svg>
    </div>

    <h1>سایت در حال به‌روزرسانی است</h1>
    <p>
      نسخه جدید پیکو ERP در حال آپلود است.<br />
      چند لحظه صبر کنید و سپس صفحه را رفرش نمایید.
    </p>

    <span class="badge">
      <span class="dot"></span>
      به‌روزرسانی در جریان است…
    </span>

    <footer>PicoERP &mdash; erp.novincn.ir</footer>
  </div>
</body>
</html>
